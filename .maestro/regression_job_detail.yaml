# Regression (P2.1): Job Detail keeps the Apr-13 redesign — Job Details + Customer cards
# present, and NO on-screen Get-Signature pad (removed in the reorg).
# Opens the first job in the default Jobs view and asserts the ALWAYS-present redesign
# structure. (The "Job Site" card is conditional on the job having an address — the
# staging seed's full-data jobs are date-filtered out of the default "Today" view, so
# asserting it here is brittle; Job-Site rendering is proven separately via the full-data
# Job Detail evidence screenshots. This flow guards the structural redesign, not data.)
appId: com.ultimatepro.staging
---
- runFlow: login.yaml
- tapOn:
    text: "Jobs"
- tapOn: "(DEMO-J|JOB)-.*"
- assertVisible: "Job Details"
- assertVisible: "Customer"
- assertNotVisible: "Get Signature"
